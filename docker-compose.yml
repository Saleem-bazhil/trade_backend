version: "3.8"

services:
  trade-report-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-report-api
    env_file:
      - .env
    restart: unless-stopped

    labels:
      - "traefik.enable=true"

      # 🌐 Domain
      - "traefik.http.routers.trade-api.rule=Host(`trade.systimus.in`) || Host(`demo.bazhilgroups.in`)"
      - "traefik.http.routers.trade-api.entrypoints=web,websecure"

      # 🔒 HTTPS
      - "traefik.http.routers.trade-api.tls=true"
      - "traefik.http.routers.trade-api.tls.certresolver=letsencrypt"

      # 🚀 Internal port
      - "traefik.http.services.trade-api.loadbalancer.server.port=8001"

      # 🔥 CORS (FULL FIX)
      - "traefik.http.middlewares.trade-cors.headers.accesscontrolalloworiginlist=https://tradereport.systimus.in,https://trade.systimus.in,https://demo.bazhilgroups.in"
      - "traefik.http.middlewares.trade-cors.headers.accesscontrolallowmethods=GET,POST,OPTIONS,PUT,DELETE"
      - "traefik.http.middlewares.trade-cors.headers.accesscontrolallowheaders=*"
      - "traefik.http.middlewares.trade-cors.headers.accesscontrolallowcredentials=true"
      - "traefik.http.middlewares.trade-cors.headers.accesscontrolmaxage=100"

      # 🔗 Attach middleware (IMPORTANT)
      - "traefik.http.routers.trade-api.middlewares=trade-cors@docker"

    networks:
      - web

networks:
  web:
    external: true