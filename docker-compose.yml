services:
  trade-report-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-report-api
    env_file:
      - .env
    restart: unless-stopped

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.trade-api.rule=Host(`trade.systimus.in`)"
      - "traefik.http.routers.trade-api.entrypoints=websecure"
      - "traefik.http.routers.trade-api.tls=true"
      - "traefik.http.services.trade-api.loadbalancer.server.port=8001"

    networks:
      - web

networks:
  web:
    external: true